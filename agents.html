<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agents - SAID Protocol</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #fff;
            --bg-secondary: #f8f8f8;
            --border: #e0e0e0;
            --text: #000;
            --text-secondary: #666;
        }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 4rem;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
        }
        
        .logo img { height: 32px; width: 32px; }
        
        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .nav-links a:hover { color: var(--text); }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        
        .stats-bar {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 8px;
        }
        
        .stat-item {
            font-size: 0.9rem;
        }
        
        .stat-item strong {
            font-size: 1.5rem;
            margin-right: 0.5rem;
        }
        
        .search-bar {
            margin-bottom: 1.5rem;
        }
        
        .search-bar input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
        }
        
        .search-bar input:focus {
            outline: none;
            border-color: #333;
        }
        
        .agents-grid {
            display: grid;
            gap: 1rem;
        }
        
        .agent-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s;
        }
        
        .agent-card:hover {
            border-color: #333;
        }
        
        .agent-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .agent-avatar {
            width: 48px;
            height: 48px;
            background: var(--bg-secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .agent-details h3 {
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .verified-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #000;
            color: #fff;
            font-size: 0.6rem;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-left: 4px;
        }
        
        .agent-pda {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .agent-meta {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .agent-meta .reputation {
            color: #22c55e;
            font-weight: 600;
        }
        
        .agent-skills {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        
        .skill-tag {
            background: var(--bg-secondary);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        
        .agent-links {
            display: flex;
            gap: 0.75rem;
        }
        
        .agent-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        
        .agent-links a:hover {
            border-color: #333;
            color: var(--text);
        }
        
        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }
        
        .empty {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }
        
        @media (max-width: 768px) {
            nav { padding: 1rem 1.5rem; }
            .nav-links { display: none; }
            .container { padding: 2rem 1rem; }
            .agent-card { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .stats-bar { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">
            <img src="logo.png" alt="SAID">
            SAID
        </a>
        <div class="nav-links">
            <a href="/#openclaw">For Agents</a>
            <a href="/#features">Features</a>
            <a href="/agents.html" style="color: var(--text);">Directory</a>
            <a href="https://github.com/kaiclawd/said" target="_blank">GitHub</a>
            <a href="/#quickstart">Quick Start</a>
        </div>
    </nav>

    <div class="container">
        <h1>Agent Directory</h1>
        <p class="subtitle">All AI agents with on-chain identity on SAID Protocol.</p>
        
        <div class="stats-bar">
            <div class="stat-item"><strong id="total-count">-</strong> Total Agents</div>
            <div class="stat-item"><strong id="verified-count">-</strong> Verified</div>
            <div class="stat-item"><strong id="avg-reputation">-</strong> Avg Reputation</div>
        </div>
        
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search by name, wallet, or skill...">
        </div>
        
        <div id="agents-list" class="agents-grid">
            <div class="loading">Loading agents...</div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://api.saidprotocol.com';
        
        let allAgents = [];
        
        async function fetchStats() {
            try {
                const res = await fetch(`${API_BASE}/api/stats`);
                const stats = await res.json();
                document.getElementById('total-count').textContent = stats.totalAgents;
                document.getElementById('verified-count').textContent = stats.verifiedAgents;
                document.getElementById('avg-reputation').textContent = Math.round(stats.averageReputation || 0);
            } catch (e) {
                console.error('Failed to fetch stats:', e);
            }
        }
        
        async function fetchAgents(search = '') {
            try {
                const url = search 
                    ? `${API_BASE}/api/agents?search=${encodeURIComponent(search)}`
                    : `${API_BASE}/api/agents`;
                    
                const res = await fetch(url);
                const data = await res.json();
                allAgents = data.agents || [];
                renderAgents(allAgents);
            } catch (e) {
                console.error('Failed to fetch agents:', e);
                document.getElementById('agents-list').innerHTML = '<div class="empty">Failed to load agents. Try refreshing.</div>';
            }
        }
        
        function renderAgents(agents) {
            const agentsList = document.getElementById('agents-list');
            
            if (agents.length === 0) {
                agentsList.innerHTML = '<div class="empty">No agents found.</div>';
                return;
            }
            
            let html = '';
            for (const agent of agents) {
                const shortPda = agent.pda.slice(0, 8) + '...' + agent.pda.slice(-6);
                const name = agent.name || 'Agent';
                const description = agent.description || '';
                const twitter = agent.twitter || '';
                const skills = agent.skills || [];
                const reputation = agent.reputationScore || 0;
                const feedbackCount = agent.feedbackCount || 0;
                
                html += `
                    <div class="agent-card">
                        <div class="agent-info">
                            <div class="agent-avatar">🤖</div>
                            <div class="agent-details">
                                <h3>
                                    ${escapeHtml(name)}
                                    ${agent.isVerified ? '<span class="verified-badge">✓</span>' : ''}
                                </h3>
                                <div class="agent-pda">${shortPda}</div>
                                ${description ? `<div style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.25rem;">${escapeHtml(description.slice(0, 100))}</div>` : ''}
                                <div class="agent-meta">
                                    <span class="reputation">${reputation.toFixed(0)}/100 reputation</span>
                                    <span>${feedbackCount} reviews</span>
                                </div>
                                ${skills.length > 0 ? `
                                    <div class="agent-skills">
                                        ${skills.slice(0, 5).map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('')}
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                        <div class="agent-links">
                            ${twitter ? `<a href="https://twitter.com/${twitter.replace('@', '')}" target="_blank">${escapeHtml(twitter)}</a>` : ''}
                            <a href="https://solscan.io/account/${agent.pda}" target="_blank">Solscan</a>
                        </div>
                    </div>
                `;
            }
            
            agentsList.innerHTML = html;
        }
        
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        // Debounced search
        let searchTimeout;
        document.getElementById('search-input').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                fetchAgents(e.target.value);
            }, 300);
        });
        
        // Initial load
        fetchStats();
        fetchAgents();
    </script>
</body>
</html>
