<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - SAID Protocol</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --border: #2a2a2a;
            --text: #fff;
            --text-secondary: #999;
            --accent: #667eea;
        }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--text);
            text-decoration: none;
        }
        
        .nav-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 7rem 2rem 4rem;
        }
        
        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 2rem;
        }
        
        .profile-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .profile-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
        }
        
        .profile-avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            margin: 0 auto 1.5rem;
        }
        
        .profile-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .profile-wallet {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        
        .btn:hover { opacity: 0.9; }
        
        .stats-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
        }
        
        .stats-card h2 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }
        
        .stat-row:last-child { border-bottom: none; }
        
        .stat-label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
        }
        
        .activity-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            margin-top: 2rem;
        }
        
        .activity-empty {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }
        
        @media (max-width: 900px) {
            .profile-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/index.html" class="logo">SAID</a>
        <div class="nav-right">
            <!-- Profile dropdown will be inserted here -->
            <div id="profile-nav-placeholder"></div>
        </div>
    </nav>

    <div class="container">
        <h1>My Profile</h1>
        
        <div class="profile-grid">
            <!-- Left: Profile Card -->
            <div class="profile-card">
                <div class="profile-avatar-large" id="profile-avatar">?</div>
                <div class="profile-name" id="profile-name">Anonymous</div>
                <div class="profile-wallet" id="profile-wallet">Not connected</div>
                <button class="btn" onclick="editProfile()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    Edit Profile
                </button>
            </div>
            
            <!-- Right: Stats -->
            <div>
                <div class="stats-card">
                    <h2>Activity Stats</h2>
                    
                    <div class="stat-row">
                        <div class="stat-label">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect></svg>
                            Agents Created
                        </div>
                        <div class="stat-value" id="stat-agents">0</div>
                    </div>
                    
                    <div class="stat-row">
                        <div class="stat-label">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                            Feedback Given
                        </div>
                        <div class="stat-value" id="stat-feedback">0</div>
                    </div>
                    
                    <div class="stat-row">
                        <div class="stat-label">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            Member Since
                        </div>
                        <div class="stat-value" id="stat-member" style="font-size: 1rem;">Feb 2026</div>
                    </div>
                </div>
                
                <!-- Recent Activity -->
                <div class="activity-card">
                    <h2>Recent Activity</h2>
                    <div class="activity-empty">
                        <p>No recent activity</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module">
        // Get current user from Privy auth
        const user = JSON.parse(localStorage.getItem('said-privy-user') || '{}');
        
        if (!user || (!user.email && !user.walletAddress)) {
            // Not logged in - redirect to home
            window.location.href = '/index.html';
        }
        
        // Update profile display
        const displayName = user.displayName || user.email || 'Anonymous';
        const initial = user.email ? user.email[0].toUpperCase() : 'U';
        const wallet = user.walletAddress || 'Not connected';
        
        document.getElementById('profile-avatar').textContent = initial;
        document.getElementById('profile-name').textContent = displayName;
        document.getElementById('profile-wallet').textContent = wallet.length > 20 ? wallet.substring(0, 8) + '...' + wallet.substring(wallet.length - 8) : wallet;
        
        // TODO: Fetch real stats from API
        // For now, showing placeholders
        
        function editProfile() {
            alert('Profile editing coming soon!');
        }
    </script>
    
    <!-- Load profile dropdown -->
    <script>
        fetch('/profile-dropdown.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('profile-nav-placeholder').innerHTML = html;
                // Update dropdown with user data
                const user = JSON.parse(localStorage.getItem('said-privy-user') || '{}');
                if (window.updateProfileDropdown) {
                    window.updateProfileDropdown(user);
                }
            });
    </script>
    
    <!-- Privy Auth -->
    <script type="module" src="/privy-auth.js"></script>
</body>
</html>
