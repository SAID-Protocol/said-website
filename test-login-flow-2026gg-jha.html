<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAID Test Login Flow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      padding: 2rem;
      line-height: 1.6;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      font-size: 0.9rem;
    }
    input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
    }
    input:focus {
      outline: none;
      border-color: #000;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background: #000;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #333;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .status {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .status.success {
      background: #e8fff1;
      color: #137a3a;
      border: 1px solid #b3f0c9;
    }
    .status.error {
      background: #ffe8e8;
      color: #c92a2a;
      border: 1px solid #ffb3b3;
    }
    .status.info {
      background: #e7f5ff;
      color: #1864ab;
      border: 1px solid #a5d8ff;
    }
    .hidden {
      display: none;
    }
    code {
      background: #f5f5f5;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Test Login Flow</h1>
    <p class="subtitle">Internal test page for email OTP authentication</p>

    <!-- Step 1: Request OTP -->
    <div id="step1">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" />
      </div>
      <button id="send-otp-btn">Send OTP Code</button>
    </div>

    <!-- Step 2: Enter OTP -->
    <div id="step2" class="hidden">
      <div class="form-group">
        <label for="otp">Enter OTP Code</label>
        <input type="text" id="otp" placeholder="123456" maxlength="6" />
      </div>
      <button id="verify-otp-btn">Verify & Login</button>
      <button id="back-btn" style="background: #666; margin-top: 0.5rem;">Back</button>
    </div>

    <!-- Status messages -->
    <div id="status" class="hidden status"></div>

    <!-- Success state -->
    <div id="success" class="hidden">
      <div class="status success">
        ✅ Login successful!
      </div>
      <div style="margin-top: 1rem; padding: 1rem; background: #f5f5f5; border-radius: 8px;">
        <p style="font-size: 0.9rem; margin-bottom: 0.5rem;"><strong>Session Token:</strong></p>
        <code id="session-token" style="word-break: break-all; font-size: 0.75rem;"></code>
      </div>
      <button id="logout-btn" style="margin-top: 1rem; background: #666;">Logout & Test Again</button>
    </div>
  </div>

  <script>
    const API_BASE = 'https://api.saidprotocol.com';
    let currentEmail = '';

    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const status = document.getElementById('status');
    const success = document.getElementById('success');

    function showStatus(message, type = 'info') {
      status.textContent = message;
      status.className = `status ${type}`;
      status.classList.remove('hidden');
      setTimeout(() => status.classList.add('hidden'), 5000);
    }

    // Send OTP
    document.getElementById('send-otp-btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      
      if (!email || !email.includes('@')) {
        showStatus('Please enter a valid email', 'error');
        return;
      }

      currentEmail = email;
      const btn = document.getElementById('send-otp-btn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch(`${API_BASE}/auth/send-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (data.ok) {
          showStatus(`OTP sent to ${email}`, 'success');
          step1.classList.add('hidden');
          step2.classList.remove('hidden');
        } else {
          showStatus(data.error || 'Failed to send OTP', 'error');
        }
      } catch (e) {
        showStatus('Network error: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send OTP Code';
      }
    });

    // Verify OTP
    document.getElementById('verify-otp-btn').addEventListener('click', async () => {
      const otp = document.getElementById('otp').value.trim();
      
      if (!otp || otp.length !== 6) {
        showStatus('Please enter a 6-digit code', 'error');
        return;
      }

      const btn = document.getElementById('verify-otp-btn');
      btn.disabled = true;
      btn.textContent = 'Verifying...';

      try {
        const res = await fetch(`${API_BASE}/auth/verify-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: currentEmail, code: otp })
        });

        const data = await res.json();

        if (data.token) {
          localStorage.setItem('said-session', data.token);
          step2.classList.add('hidden');
          success.classList.remove('hidden');
          document.getElementById('session-token').textContent = data.token;
        } else {
          showStatus(data.error || 'Invalid code', 'error');
        }
      } catch (e) {
        showStatus('Network error: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Verify & Login';
      }
    });

    // Back button
    document.getElementById('back-btn').addEventListener('click', () => {
      step2.classList.add('hidden');
      step1.classList.remove('hidden');
      document.getElementById('otp').value = '';
    });

    // Logout
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('said-session');
      success.classList.add('hidden');
      step1.classList.remove('hidden');
      document.getElementById('email').value = '';
      document.getElementById('otp').value = '';
      currentEmail = '';
    });

    // Auto-focus email on load
    document.getElementById('email').focus();
  </script>
</body>
</html>
