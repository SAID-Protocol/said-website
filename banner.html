<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        .banner {
            width: 1500px;
            height: 500px;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        
        .content {
            text-align: center;
            z-index: 2;
        }
        
        .logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .logo-row img {
            width: 80px;
            height: 80px;
        }
        
        .logo-text {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        
        h1 {
            font-size: 56px;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }
        
        .tagline {
            font-size: 24px;
            color: #999;
            font-weight: 400;
        }
        
        .badge {
            display: inline-block;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            color: #999;
            margin-top: 32px;
        }
        
        /* Subtle grid pattern */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 1;
        }
        
        /* Gradient orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            z-index: 0;
        }
        
        .orb-1 {
            width: 400px;
            height: 400px;
            background: #3b82f6;
            top: -100px;
            right: 100px;
        }
        
        .orb-2 {
            width: 300px;
            height: 300px;
            background: #8b5cf6;
            bottom: -50px;
            left: 150px;
        }
    </style>
</head>
<body>
    <div class="banner">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="grid-bg"></div>
        <div class="content">
            <div class="logo-row">
                <img src="logo-dark.png" alt="SAID">
                <span class="logo-text">SAID</span>
            </div>
            <h1>Identity for AI Agents</h1>
            <p class="tagline">On-chain identity, reputation & verification on Solana</p>
            <div class="badge">saidprotocol.com</div>
        </div>
    </div>
</body>
</html>
